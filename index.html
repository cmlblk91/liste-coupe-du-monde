<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Liste - LaTaniereDZ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="interface-choix">
        <h1>Crée ta liste pour la coupe du monde 🇩🇿</h1>
        
        <div class="categories-container">
            
            <div id="step-1" class="step-container active">
                <div class="colonne-choix">
                    <h3>Gardiens <span id="cpt-gardien" class="compteur">(0/3)</span></h3>
                    <div id="liste-gardiens"></div>
                </div>
                <button class="btn-step" onclick="showStep(2)">SUIVANT</button>

<div class="navigation-btns">
    <button class="btn-back" onclick="showStep(1)">RETOUR</button>
    <button class="btn-step" onclick="showStep(3)">SUIVANT</button>
</div>
            </div>

            <div id="step-2" class="step-container">
                <div class="colonne-choix">
                    <h3>Défenseurs <span id="cpt-defenseur" class="compteur">(0/9)</span></h3>
                    <div id="liste-defenseurs"></div>
                </div>
                <div class="navigation-btns">
                    <button class="btn-back" onclick="showStep(1)">Retour</button>
                    <button class="btn-step" onclick="showStep(3)">Suivant : Milieux & Att.</button>
                </div>
            </div>

            <div id="step-3" class="step-container">
                <div class="colonne-choix">
                    <h3 style="text-align: center; margin-bottom: 15px;">Milieux & Attaquants <span id="cpt-mixte" class="compteur">(0/14)</span></h3>
                    <div id="liste-mixte-container" style="display: flex; flex-direction: column; gap: 20px;">
                        <div id="liste-milieux"></div>
                        <div id="liste-attaquants"></div>
                    </div>
                </div>
                <div class="navigation-btns">
                    <button class="btn-back" onclick="showStep(2)">Retour</button>
                    <button class="btn-generer" onclick="genererVisuel()">GÉNÉRER MA LISTE</button>
                </div>
            </div>

        </div>
    </div>

    <div id="zone-a-capturer">
        <div class="top-header">⚽ ALGÉRIE ⚽</div>
        <div class="main-title">
            <div class="title-text">MA LISTE POUR LA COUPE DU MONDE</div>
        </div>

        <div class="layout-colonnes">
            <div class="colonne-visuel">
                <div class="bloc-poste">
                    <div class="etiquette-verticale">GARDIENS</div>
                    <ul class="liste-joueurs" id="visuel-gardiens"></ul>
                </div>
                <div class="bloc-poste">
                    <div class="etiquette-verticale">DÉFENSEURS</div>
                    <ul class="liste-joueurs" id="visuel-defenseurs"></ul>
                </div>
            </div>

            <div class="colonne-visuel">
                <div class="bloc-poste">
                    <div class="etiquette-verticale">MILIEUX</div>
                    <ul class="liste-joueurs" id="visuel-milieux"></ul>
                </div>
                <div class="bloc-poste">
                    <div class="etiquette-verticale">ATTAQUANTS</div>
                    <ul class="liste-joueurs" id="visuel-attaquants"></ul>
                </div>
            </div>
        </div>

        <div class="footer-visuel">
            <img src="logos/cdm.png" class="logo-bas-gauche">
            <h3>#LaTaniereDZ</h3>
        </div>
    </div> 
    
    <div id="resultat">
        <h2>Voici ta liste ! 👇</h2>
        <button id="btn-telecharger" onclick="telechargerImage()">TÉLÉCHARGER MON IMAGE</button>
        <div id="image-finale"></div>
    </div>

    <script src="joueurs.js"></script>
    <script src="script.js"></script>

    <script>
        function showStep(stepNumber) {
            // Cache toutes les étapes
            document.querySelectorAll('.step-container').forEach(step => {
                step.classList.remove('active');
            });
            // Affiche l'étape choisie
            document.getElementById('step-' + stepNumber).classList.add('active');
            // Remonte en haut de page
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDQ_qrhdoAM1Bi7htqbi8t3WlqE5aHf-A",
        authDomain: "liste-dz.firebaseapp.com",
        projectId: "liste-dz",
        storageBucket: "liste-dz.firebasestorage.app",
        messagingSenderId: "734747884688",
        appId: "1:734747884688:web:f816604780c5efba95ec15",
        measurementId: "G-CQ4ZVSZTT5"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.envoyerStatsFirebase = async function() {
        const joueursChoisis = [];
        document.querySelectorAll('input:checked').forEach(cb => {
          joueursChoisis.push(cb.dataset.nom);
        });

        if (joueursChoisis.length === 0) return;

        try {
          await addDoc(collection(db, "listes_utilisateurs"), {
            composition: joueursChoisis,
            creeLe: serverTimestamp()
          });
        } catch (e) {
          console.error("Erreur stats : ", e);
        }
      }
    </script>
</body>
</html>
